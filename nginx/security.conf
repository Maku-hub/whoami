# security headers
add_header X-Frame-Options           "SAMEORIGIN";
add_header X-XSS-Protection          "1; mode=block" always;
add_header X-Content-Type-Options    "nosniff" always;
add_header Referrer-Policy           "no-referrer-when-downgrade" always;
# Scoped to the origins the site actually uses. 'unsafe-inline' is required for
# the inline <script>/particles config, and 'unsafe-eval' for the obfuscated
# tracking script (it uses the Function constructor). connect-src covers ipify
# and the same-origin /ip-api/ proxy.
add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://use.fontawesome.com; font-src 'self' https://fonts.gstatic.com https://use.fontawesome.com; img-src 'self' data:; connect-src 'self' https://api.ipify.org; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

