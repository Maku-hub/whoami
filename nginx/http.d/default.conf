server {
    listen 80;
    server_name frog02-20981.wykr.es;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
        listen 20981   default_server;
        #listen 30981   default_server;
        #listen 40981   default_server;

        server_name    frog02-20981.wykr.es;

        root /var/www/html/;
        index index.html;

        # Redirect all non-slash URLs to include a trailing slash
        #rewrite ^/save-user-data$ /save-user-data/ permanent;
        rewrite ^([^.]*[^/])$ $1/ permanent;

        error_page 500 502 503 504 /errors/50x.html;
        location /errors/50x.html {
            internal;
        }
        error_page 401 /errors/401.html;
        location /errors/401.html {
            internal;
        }
        error_page 403 /errors/403.html;
        location /errors/403.html {
            internal;
        }
        error_page 404 /errors/404.html;
        location /errors/404.html {
            internal;
        }

        # NOTE: the former /get-user-info endpoint was removed. It reflected raw
        # request headers into a JSON body without escaping (JSON/header injection)
        # and its X-Forwarded-For handling was buggy. It was unused: the client
        # script gathers this info directly (navigator + ipify + the /ip-api/ proxy).

        location /ip-api/ {
            proxy_pass http://ip-api.com/json/;
            proxy_set_header Host ip-api.com;
            rewrite ^/ip-api/(.*)$ /json/$1 break;
        }

        location /save-user-data/ {
            # Throttle writes so the table can't be flooded with junk rows.
            # Zone + rate are defined in nginx.conf (http block).
            limit_req zone=savedata burst=5 nodelay;

            proxy_pass http://127.0.0.1:5000/save-user-data/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /stats/ {
            # Collected visitor data is sensitive – require authentication.
            # Create the credentials file with:
            #   apk add apache2-utils          # provides htpasswd on Alpine
            #   htpasswd -c /etc/nginx/.htpasswd <username>
            auth_basic           "Restricted – Visitor Stats";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://127.0.0.1:5000/stats/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /.well-known/mojecertpl/verification {
            alias /var/www/html/files/verification;
        }

}
